name: Build and push RunPod image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v3)"
        required: true
        default: "latest"

jobs:
  eval-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run orchestrator regression eval
        env:
          ORCHESTRATOR_BASE_URL: https://api.groq.com/openai/v1
          ORCHESTRATOR_MODEL: llama-3.1-8b-instant
          ORCHESTRATOR_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python tests_orchestrator.py

  regression-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: template
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      # GPU-independent regression suite — runs on every push, no model weights
      # or running server needed. This does NOT replace eval_v6.py (accuracy of
      # the fine-tuned model itself): that script loads the 7B checkpoint via
      # unsloth/CUDA and cannot run on a standard GitHub-hosted runner. Until a
      # GPU-capable runner is wired up, eval_v6.py stays a manual gate — run it
      # by hand on the training GPU box before promoting a new adapter version,
      # per RELEASE_CHECKLIST.md.
      - name: Run token efficiency + tool registry regression
        run: uv run python test_token_efficiency.py

      - name: Run S3 WORM audit trail regression (moto-mocked, no AWS needed)
        run: uv run python test_s3_audit.py

  build-and-push:
    needs: [eval-orchestrator, regression-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: dreyich/veles-agent:${{ github.event.inputs.tag }}
