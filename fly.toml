app = "veles-finance-gateway"
primary_region = "arn"

[build]
  dockerfile = "deploy/Dockerfile.gateway"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  # Was 0 — the gateway itself going cold and stacking on top of RunPod's own
  # GPU cold start was enough to blow past the proxy's request timeout,
  # surfacing as "NetworkError" in the browser even though the backend
  # eventually responded. This machine is tiny (shared CPU, 512mb) so keeping
  # one warm costs a few dollars/month — the RunPod GPU worker (the real
  # cost driver) is untouched and still scales to zero.
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
