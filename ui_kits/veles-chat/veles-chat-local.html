/* ═══════════════════════════════════════════════════════════════
   BACKEND CONFIG — FastAPI з live-tools (FRED, NBU, World Bank)
   ═══════════════════════════════════════════════════════════════ */
const BACKEND = "http://localhost:8000/api/v1";
const DEMO_EMAIL = "demo@veles.ai";
const DEMO_PASSWORD = "VelesDemo2026!";

async function getSessionToken(chatId) {
  const key = "veles_token_" + chatId;
  const saved = localStorage.getItem(key);
  if (saved) {
    try {
      const r = await fetch(`${BACKEND}/chatbot/messages`, {
        headers: { Authorization: "Bearer " + saved }
      });
      if (r.ok) return saved;
    } catch {}
  }
  let userToken = null;
  const tryLogin = async () => {
    const r = await fetch(`${BACKEND}/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({ email: DEMO_EMAIL, password: DEMO_PASSWORD, grant_type: "password" }),
    });
    if (r.ok) { userToken = (await r.json()).access_token; }
  };
  await tryLogin();
  if (!userToken) {
    await fetch(`${BACKEND}/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: DEMO_EMAIL, password: DEMO_PASSWORD, username: "Veles Demo" }),
    });
    await tryLogin();
  }
  if (!userToken) throw new Error("Auth failed");
  const sr = await fetch(`${BACKEND}/auth/session`, {
    method: "POST",
    headers: { Authorization: "Bearer " + userToken },
  });
  if (!sr.ok) throw new Error("Session creation failed");
  const token = (await sr.json()).token.access_token;
  localStorage.setItem(key, token);
  return token;
}

async function loadBackendHistory(token) {
  try {
    const r = await fetch(`${BACKEND}/chatbot/messages`, {
      headers: { Authorization: "Bearer " + token }
    });
    if (!r.ok) return [];
    const data = await r.json();
    return (data.messages || []).map(m => ({ role: m.role === "assistant" ? "ai" : m.role, text: m.content }));
  } catch { return []; }
}


/* ═══════════════════════════════════════════════════════════════
   ThinkingViz
   ═══════════════════════════════════════════════════════════════ */
const ACCENT = "#cdb7ff";
const tvText = { fontFamily: "var(--font-sans)", fontSize: 13.5, color: "var(--text-secondary)", letterSpacing: "-0.01em" };

function detectType(q = "") {
  const s = q.toLowerCase();
  if (/(valuat|dcf|fair value|worth|оцінк|вартіст)/.test(s)) return "valuation";
  if (/(risk|ризик|exposure|liquidity|credit)/.test(s)) return "risk";
  if (/(market|trend|ринок|price|stock|candle)/.test(s)) return "market";
  return "diligence";
}

const STEPS = {
  diligence: ["Parsing filings…", "Charting revenue…", "Scoring risk exposure…", "Mapping competitors…"],
  risk: ["Market risk…", "Credit risk…", "Liquidity risk…", "Operational risk…"],
  valuation: ["Projecting cash flows…", "Applying discount rate…", "Adding terminal value…", "Deriving fair value…"],
  market: ["Fetching price history…", "Building candles…", "Reading momentum…", "Detecting trend…"],
};

function VizDiligence() {
  return (

      <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", gap: 10 }}>
        <div>
          <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginBottom: 5 }}>Risk exposure</div>
          <div style={{ height: 6, borderRadius: 99, background: "rgba(255,255,255,0.08)", overflow: "hidden" }}>
            <div className="tv-meter" style={{ height: "100%", background: ACCENT, borderRadius: 99 }} />
          </div>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          {["NW","Hx","Vl","Kr"].map((c,i)=>(
            <span key={c} className="tv-chip" style={{ animationDelay: `${1.4+i*0.18}s`, width: 28, height: 28,
              borderRadius: 8, background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)",

              color: "var(--text-secondary)", fontFamily: "var(--font-mono)" }}>{c}</span>
          ))}

      </div>

}

function VizRisk() {
  const cx = 95, cy = 70, R = 54;
  const pts = [[0,-1],[0.95,-0.31],[0.59,0.81],[-0.59,0.81],[-0.95,-0.31]];
  const poly = pts.map(([x,y])=>`${cx+x*R*0.78},${cy+y*R*0.78}`).join(" ");
  return (
    <svg width="190" height="140" viewBox="0 0 190 140">
      {[0.4,0.7,1].map((r,gi)=>(
        <polygon key={gi} points={pts.map(([x,y])=>`${cx+x*R*r},${cy+y*R*r}`).join(" ")}
          fill="none" stroke="rgba(255,255,255,0.10)" />
      ))}
      {pts.map(([x,y],i)=>(
        <line key={i} x1={cx} y1={cy} x2={cx+x*R} y2={cy+y*R} stroke="rgba(255,255,255,0.08)" />
      ))}
      <polygon className="tv-radar" points={poly} fill={ACCENT+"33"} stroke={ACCENT} strokeWidth="2" />
      {pts.map(([x,y],i)=>(
        <circle key={i} cx={cx+x*R*0.78} cy={cy+y*R*0.78} r="3" fill={ACCENT} className="tv-dot"
          style={{ animationDelay: `${0.6+i*0.22}s` }} />
      ))}
    </svg>
  );
}

function VizValuation() {
  const rows = [["Yr1","2.1"],["Yr2","2.9"],["Yr3","3.8"],["TV","18.4"]];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 6, width: 200 }}>
      {rows.map(([k,v],i)=>(
        <React.Fragment key={k}>
          <div style={{ fontSize: 12, color: "var(--text-tertiary)", display: "flex", alignItems: "center",
            padding: "6px 8px", background: "rgba(255,255,255,0.04)", borderRadius: 7 }}>{k}</div>
          <div className="tv-cell" style={{ animationDelay: `${0.3+i*0.25}s`, fontFamily: "var(--font-mono)",
            fontSize: 14, color: "var(--text-primary)", padding: "6px 8px", background: "rgba(255,255,255,0.06)",
            borderRadius: 7, textAlign: "right" }}>${v}M</div>
        </React.Fragment>
      ))}
    </div>
  );
}

function VizMarket() {
  const candles = [[60,18,1],[52,22,0],[58,16,1],[64,20,1],[55,24,0],[68,18,1],[62,26,0],[72,16,1],[78,20,1],[70,22,0],[82,18,1],[90,24,1]];
  return (
    <svg width="220" height="100" viewBox="0 0 220 100">
      {candles.map(([h,wick,up],i)=>{
        const x = 12 + i*16, top = 86-h, col = up ? "#9fe6c4" : "#e6a8a8";
        return (
          <g key={i} className="tv-candle" style={{ animationDelay: `${0.2+i*0.13}s`, transformOrigin: `${x+3}px 86px` }}>
            <line x1={x+3} y1={top-wick/2} x2={x+3} y2={86-h+h+wick/2-h} stroke={col} strokeWidth="1" opacity="0.6" />
            <line x1={x+3} y1={top-6} x2={x+3} y2={top+h*0.0} stroke={col} strokeWidth="1" opacity="0.5" />
            <rect x={x} y={top} width="7" height={h*0.5} rx="1.5" fill={col} />
          </g>
        );
      })}
    </svg>
  );
}

const VIZ = { diligence: VizDiligence, risk: VizRisk, valuation: VizValuation, market: VizMarket };

function VelesThinking({ type = "diligence" }) {
  const steps = STEPS[type] || STEPS.diligence;
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setIdx((i) => (i + 1) % steps.length), 1100);
    return () => clearInterval(id);
  }, [type]);
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [type]);
  const Viz = VIZ[type] || VizDiligence;

  return (
    <div style={{ maxWidth: 460 }}>
      <div style={{ position: "relative", overflow: "hidden", borderRadius: 18, padding: "16px 18px",
        background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.09)",
        backdropFilter: "blur(20px) saturate(160%)", WebkitBackdropFilter: "blur(20px) saturate(160%)",
        boxShadow: "inset 0 1px 0 rgba(255,255,255,0.10)" }}>
        <div className="tv-shimmer" aria-hidden="true" />
        <div style={{ minHeight: 92, display: "flex", alignItems: "center" }}><Viz /></div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, paddingLeft: 2 }}>
        <span className="tv-spark"><i data-lucide="sparkles" style={{ width: 14, height: 14, color: ACCENT }}></i></span>
        <span key={idx} className="tv-fadein" style={tvText}>{steps[idx]}</span>
      </div>

      <style>{`
        .tv-draw{stroke-dasharray:420;stroke-dashoffset:420;animation:tvDraw 1.6s var(--ease-soft) forwards}
        @keyframes tvDraw{to{stroke-dashoffset:0}}
        .tv-dot{opacity:0;animation:tvPop .4s var(--ease-soft) forwards}
        @keyframes tvPop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
        .tv-meter{width:0;animation:tvMeter 1.6s .6s var(--ease-soft) forwards}
        @keyframes tvMeter{to{width:64%}}
        .tv-chip{opacity:0;animation:tvChip .5s var(--ease-soft) forwards}
        @keyframes tvChip{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .tv-radar{opacity:0;transform-origin:center;animation:tvRadar 1.2s .3s var(--ease-soft) forwards}
        @keyframes tvRadar{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
        .tv-cell{opacity:0;animation:tvCell .5s var(--ease-soft) forwards}
        @keyframes tvCell{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        .tv-candle{opacity:0;animation:tvCandle .4s var(--ease-soft) forwards}
        @keyframes tvCandle{from{opacity:0;transform:scaleY(0)}to{opacity:1;transform:scaleY(1)}}
        .tv-fadein{animation:tvFade .45s var(--ease-soft)}
        @keyframes tvFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        .tv-spark{display:inline-flex;animation:tvSpin 3s linear infinite}
        @keyframes tvSpin{to{transform:rotate(360deg)}}
        .tv-shimmer{position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(205,183,255,0.10) 50%,transparent 70%);background-size:220% 100%;animation:tvShim 2.4s linear infinite;pointer-events:none}
        @keyframes tvShim{to{background-position:-220% 0}}
      `}</style>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   Sidebar

const sbPanel = {
  width: 272, flexShrink: 0, height: "100%", boxSizing: "border-box",
  display: "flex", flexDirection: "column", gap: 14, padding: "18px 14px",
  background: "rgba(7,7,10,0.66)", backdropFilter: "blur(30px) saturate(150%)",
  WebkitBackdropFilter: "blur(30px) saturate(150%)",
  borderRight: "1px solid rgba(255,255,255,0.06)",
};
const sbSearch = {
  width: "100%", boxSizing: "border-box", border: "1px solid rgba(255,255,255,0.10)",
  background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "9px 12px 9px 34px",
  color: "var(--text-primary)", fontFamily: "var(--font-sans)", fontSize: 13.5, outline: "none",
};

function VelesSidebar({ sessions, active, onSelect, onNew }) {
  const [q, setQ] = useState("");

  const grouped = React.useMemo(() => {
    const now = Date.now();
    const today = [], yesterday = [], older = [];
    sessions.forEach(s => {
      const diff = (now - s.updatedAt) / 86400000;
      if (diff < 1) today.push(s);
      else if (diff < 2) yesterday.push(s);
      else older.push(s);
    });
    return [
      { label: "Today", items: today },
      { label: "Yesterday", items: yesterday },
      { label: "Last week", items: older },
    ].filter(g => g.items.length > 0);
  }, [sessions]);

  const filtered = grouped.map(g => ({
    ...g,
    items: g.items.filter(s => s.title.toLowerCase().includes(q.toLowerCase()))
  })).filter(g => g.items.length > 0);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  return (
    <aside style={sbPanel}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "2px 6px 6px" }}>
        <span style={{ width: 26, height: 26, borderRadius: 8, padding: 1.5, background: "var(--rainbow)",
          display: "inline-flex" }}>
          <span style={{ width: "100%", height: "100%", borderRadius: 7, background: "#0c0c10",
            display: "inline-flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 13 }}>V</span>
        </span>
        <span style={{ fontWeight: 600, fontSize: 15 }}>Veles</span>
      </div>

      <button onClick={onNew}
        style={{ display: "flex", alignItems: "center", gap: 9, width: "100%", boxSizing: "border-box",
          padding: "11px 14px", borderRadius: 12, cursor: "pointer", color: "var(--text-primary)",
          background: "rgba(255,255,255,0.10)", border: "1px solid rgba(255,255,255,0.14)",
          fontFamily: "var(--font-sans)", fontSize: 14, fontWeight: 500 }}>
        <i data-lucide="plus" style={{ width: 16, height: 16 }}></i> New chat
      </button>

      <div style={{ position: "relative" }}>
        <i data-lucide="search" style={{ width: 15, height: 15, position: "absolute", left: 12, top: 10,
          color: "var(--text-tertiary)" }}></i>
        <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search chats" style={sbSearch} />
      </div>

      <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 16, marginTop: 4 }}>
        {filtered.length === 0 && (
          <div style={{ fontSize: 13, color: "var(--text-tertiary)", textAlign: "center", paddingTop: 24 }}>
            No chats yet. Start one!
          </div>
        )}
        {filtered.map((sec) => (
          <div key={sec.label} style={{ display: "flex", flexDirection: "column", gap: 2 }}>
            <div style={{ fontSize: 11, letterSpacing: "0.06em", textTransform: "uppercase",
              color: "var(--text-tertiary)", padding: "2px 10px 6px" }}>{sec.label}</div>
            {sec.items.map((s) => {
              const on = s.id === active;
              return (
                <button key={s.id} onClick={() => onSelect(s.id)}
                  style={{ display: "flex", alignItems: "center", gap: 9, width: "100%", boxSizing: "border-box",
                    textAlign: "left", padding: "9px 10px", borderRadius: 9, cursor: "pointer", border: "none",
                    background: on ? "rgba(255,255,255,0.09)" : "transparent",
                    color: on ? "var(--text-primary)" : "var(--text-secondary)",
                    fontFamily: "var(--font-sans)", fontSize: 13.5, whiteSpace: "nowrap", overflow: "hidden",
                    textOverflow: "ellipsis" }}>
                  <i data-lucide="message-square" style={{ width: 14, height: 14, flexShrink: 0, opacity: 0.7 }}></i>
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis" }}>{s.title}</span>
                </button>
              );
            })}
          </div>
        ))}
      </div>

      <button style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", borderRadius: 10,
        cursor: "pointer", border: "none", background: "transparent", color: "var(--text-secondary)",
        fontFamily: "var(--font-sans)", fontSize: 13.5 }}>
        <span style={{ width: 26, height: 26, borderRadius: "50%", background: "rgba(255,255,255,0.10)",
          border: "1px solid rgba(255,255,255,0.14)", display: "inline-flex", alignItems: "center",
          justifyContent: "center", fontSize: 11, fontWeight: 600 }}>JD</span>
        Jordan Davies
      </button>
    </aside>
  );
}

// Render a financial data widget from VelesEnvelope.financial_data
function renderFinancialWidget(intent, data) {
  if (!data) return "";
  if (intent === "fx_rate" && data.currency_pair && data.rate != null) {
    const chg = data.change_pct != null
      ? `<span style="font-size:12px;margin-left:4px;color:${data.change_pct >= 0 ? '#4ade80' : '#f87171'}">${data.change_pct >= 0 ? '+' : ''}${data.change_pct.toFixed(2)}%</span>`
      : "";
    return `<div style="display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:9px 16px;margin:10px 0 4px">
      <span style="font-size:12px;opacity:0.55;font-family:var(--font-mono);letter-spacing:.04em">${data.currency_pair}</span>
      <span style="font-size:20px;font-weight:700;font-family:var(--font-mono)">${Number(data.rate).toFixed(4)}</span>
      ${chg}
      ${data.source ? `<span style="font-size:11px;opacity:0.35;margin-left:4px">${data.source}</span>` : ""}
    </div>`;
  }
  if ((intent === "equity") && data.ticker && data.price != null) {
    const verdictStyle = data.verdict === "APPROVED"
      ? "color:#4ade80;font-weight:700"
      : data.verdict === "REJECTED"
        ? "color:#f87171;font-weight:700"
        : "color:rgba(255,255,255,0.6)";
    return `<div style="display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:9px 16px;margin:10px 0 4px">
      <span style="font-size:13px;font-weight:700;font-family:var(--font-mono)">${data.ticker}</span>
      <span style="font-size:18px;font-weight:600">$${Number(data.price).toFixed(2)}</span>
      ${data.market_cap ? `<span style="font-size:11px;opacity:0.45">${data.market_cap}</span>` : ""}
      ${data.verdict ? `<span style="font-size:12px;${verdictStyle}">${data.verdict}</span>` : ""}
      ${data.confidence != null ? `<span style="font-size:11px;opacity:0.4">${(data.confidence * 100).toFixed(0)}% conf.</span>` : ""}
    </div>`;
  }
  return "";
}

function renderMarkdown(raw) {
  if (!raw) return { __html: "" };

  // 0. Extract <thinking> and <output> blocks before escaping
  let thinking = "";
  let body = raw;

  const thinkMatch = raw.match(/<thinking>([\s\S]*?)<\/thinking>/i);
  if (thinkMatch) {
    thinking = thinkMatch[1].trim();
    body = raw.slice(raw.indexOf("</thinking>") + "</thinking>".length).trim();
  }

  const outMatch = body.match(/<output>([\s\S]*?)<\/output>/i);
  if (outMatch) {
    body = outMatch[1].trim();
  } else {
    // Strip any remaining open/close tags
    body = body.replace(/<\/?output>/gi, "").replace(/<\/?thinking>/gi, "").trim();
  }

  // 0b. Universal Envelope — find JSON anywhere in body (model may prefix with [calls...] lines)
  let financialWidgetHtml = "";
  // Find the first { that starts a VelesEnvelope JSON block
  const jsonStart = body.indexOf('{"intent"');
  const jsonStartAlt = body.indexOf('{"intent" ');
  const jIdx = jsonStart >= 0 ? jsonStart : (jsonStartAlt >= 0 ? jsonStartAlt : -1);
  const jsonBody = jIdx >= 0 ? body.slice(jIdx) : (body.trimStart().startsWith("{") ? body.trimStart() : null);

  if (jsonBody) {
    try {
      // State 3: full JSON available
      const envelope = JSON.parse(jsonBody);
      if (envelope.intent && envelope.text_response !== undefined) {
        financialWidgetHtml = renderFinancialWidget(envelope.intent, envelope.financial_data);
        // Prepend expert_justification as collapsible block
        if (envelope.expert_justification) {
          const ej = envelope.expert_justification
            .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
          const uid2 = 'ej_' + Math.random().toString(36).slice(2,7);
          const words2 = envelope.expert_justification.trim().split(/\s+/).length;
          prefix += `
<div class="veles-think-wrap" id="${uid2}" style="margin-bottom:14px">
  <button onclick="(function(el){el.classList.toggle('open')})(document.getElementById('${uid2}'))"
    style="display:flex;align-items:center;gap:8px;background:rgba(74,222,128,0.07);border:1px solid rgba(74,222,128,0.18);
    border-radius:10px;padding:7px 13px;cursor:pointer;width:100%;text-align:left;
    color:rgba(74,222,128,0.85);font-family:var(--font-sans);font-size:12.5px;font-weight:500;
    transition:background 0.2s;outline:none"
    onmouseover="this.style.background='rgba(74,222,128,0.12)'"
    onmouseout="this.style.background='rgba(74,222,128,0.07)'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;opacity:0.7">
      <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
    </svg>
    <span style="flex:1">Обґрунтування аналітика</span>
    <span style="opacity:0.45;font-size:11px;font-family:var(--font-mono)">${words2} слів</span>
    <svg class="veles-think-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      style="flex-shrink:0;opacity:0.55;transition:transform 0.25s">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>
  <div class="veles-think-body" style="display:none;margin-top:6px;border-radius:10px;
    background:rgba(74,222,128,0.04);border:1px solid rgba(74,222,128,0.12);
    padding:14px 16px;overflow:hidden">
    <div style="font-family:var(--font-sans);font-size:13px;color:rgba(255,255,255,0.75);line-height:1.7">${ej}</div>
  </div>
</div>`;
        }
        body = envelope.text_response;
      }
    } catch (_) {
      // State 1 or 2: streaming — JSON is incomplete
      const m = jsonBody.match(/"text_response"\s*:\s*"((?:[^"\\]|\\.)*)(?:"|$)/s);
      if (m) {
        body = m[1]
          .replace(/\\n/g, "\n")
          .replace(/\\t/g, "\t")
          .replace(/\\r/g, "")
          .replace(/\\"/g, '"')
          .replace(/\\\\/g, "\\");
      } else if (jsonBody.includes('"intent"')) {
        body = "";
      }
    }
  } else if (body.includes('"text_response"')) {
    // Fallback: extract text_response from anywhere
    const m = body.match(/"text_response"\s*:\s*"((?:[^"\\]|\\.)*)"/s);
    if (m) {
      body = m[1].replace(/\\n/g, "\n").replace(/\\"/g, '"').replace(/\\\\/g, "\\");
    }
  }

  // Build beautiful collapsible thinking block if present
  let prefix = "";
  if (thinking) {
    const words = thinking.trim().split(/\s+/).length;
    // Parse thinking into structured sections for nicer display
    const thinkLines = thinking.trim()
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .split('\n')
      .map(line => {
        const l = line.trim();
        if (!l) return '';
        // Highlight key=value patterns like "spot=44.92"
        const highlighted = l
          .replace(/(\d+\.?\d*)/g, '<span style="color:#cdb7ff;font-weight:600">$1</span>')
          .replace(/\b(IRP|PPP|NBU|Fed|CPI|UAH|USD|EUR|GBP|VERDICT|base|bull|bear|APPROVED|REJECTED)\b/g,
            '<span style="color:rgba(205,183,255,0.8);font-family:var(--font-mono);font-size:0.92em">$1</span>');
        return `<div style="padding:2px 0;line-height:1.6">${highlighted}</div>`;
      }).join('');

    const uid = 'th_' + Math.random().toString(36).slice(2,7);
    prefix += `
<div class="veles-think-wrap" id="${uid}" style="margin-bottom:14px">
  <button onclick="(function(el){el.classList.toggle('open')})(document.getElementById('${uid}'))"
    style="display:flex;align-items:center;gap:8px;background:rgba(205,183,255,0.07);border:1px solid rgba(205,183,255,0.18);
    border-radius:10px;padding:7px 13px;cursor:pointer;width:100%;text-align:left;
    color:rgba(205,183,255,0.85);font-family:var(--font-sans);font-size:12.5px;font-weight:500;
    transition:background 0.2s;outline:none"
    onmouseover="this.style.background='rgba(205,183,255,0.12)'"
    onmouseout="this.style.background='rgba(205,183,255,0.07)'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;opacity:0.7">
      <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
    </svg>
    <span style="flex:1">Ланцюжок аналізу</span>
    <span style="opacity:0.45;font-size:11px;font-family:var(--font-mono)">${words} слів</span>
    <svg class="veles-think-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      style="flex-shrink:0;opacity:0.55;transition:transform 0.25s">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>
  <div class="veles-think-body" style="display:none;margin-top:6px;border-radius:10px;
    background:rgba(205,183,255,0.04);border:1px solid rgba(205,183,255,0.12);
    padding:14px 16px;overflow:hidden">
    <div style="font-family:var(--font-mono);font-size:12px;color:rgba(255,255,255,0.55);line-height:1.7;white-space:pre-wrap">${thinkLines}</div>
  </div>
</div>
<style>
  .veles-think-wrap.open .veles-think-body { display:block !important; animation: thinkSlide 0.22s ease-out; }
  .veles-think-wrap.open .veles-think-chevron { transform: rotate(180deg); }
  @keyframes thinkSlide { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
</style>`;
  }

  // 1. HTML-escape the body
  let t = body
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  // 2. Fenced code blocks
  t = t.replace(/```(?:\w+\n)?([\s\S]*?)```/g, (_, code) =>
    `<pre style="background:rgba(255,255,255,0.05);border-radius:8px;padding:12px 16px;overflow-x:auto;font-family:var(--font-mono);font-size:12.5px;margin:10px 0;white-space:pre-wrap">${code.trim()}</pre>`
  );

  // 3. Inline code
  t = t.replace(/`([^`]+)`/g, `<code style="background:rgba(255,255,255,0.08);padding:1px 6px;border-radius:4px;font-family:var(--font-mono);font-size:0.88em">$1</code>`);

  // 4. Bold + italic (order matters: *** before ** before *)
  t = t.replace(/\*\*\*(.+?)\*\*\*/gs, "<strong><em>$1</em></strong>");
  t = t.replace(/\*\*(.+?)\*\*/gs,     "<strong>$1</strong>");
  t = t.replace(/__(.+?)__/gs,          "<strong>$1</strong>");
  t = t.replace(/\*(.+?)\*/gs,          "<em>$1</em>");
  t = t.replace(/_([^_\s][^_]*)_/gs,   "<em>$1</em>");

  // 5. Headings
  t = t.replace(/^#### (.+)$/gm, `<div style="margin:8px 0 2px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.45)">$1</div>`);
  t = t.replace(/^### (.+)$/gm,  `<div style="margin:10px 0 3px;font-size:13px;font-weight:600;color:var(--text-primary)">$1</div>`);
  t = t.replace(/^## (.+)$/gm,   `<div style="margin:12px 0 4px;font-size:14px;font-weight:700;color:var(--text-primary)">$1</div>`);
  t = t.replace(/^# (.+)$/gm,    `<div style="margin:12px 0 4px;font-size:15px;font-weight:700;color:var(--text-primary)">$1</div>`);

  // 6. Horizontal rule
  t = t.replace(/^---+$/gm, `<hr style="border:none;border-top:1px solid rgba(255,255,255,.10);margin:8px 0">`);

  // 7. Bullet lists
  t = t.replace(/^[ \t]*[-*•] (.+)$/gm, `<div style="display:flex;gap:6px;margin:1px 0"><span style="opacity:.5;flex-shrink:0">•</span><span>$1</span></div>`);

  // 8. Numbered lists
  t = t.replace(/^(\d+)\. (.+)$/gm, `<div style="display:flex;gap:6px;margin:1px 0"><span style="opacity:.5;flex-shrink:0;min-width:14px">$1.</span><span>$2</span></div>`);

  // 9. Paragraphs — blank lines → small gap
  t = t.replace(/\n{2,}/g, `</p><p style="margin:5px 0">`);
  t = t.replace(/\n/g, "<br>");
  t = `<p style="margin:0">${t}</p>`;

  return { __html: prefix + t + financialWidgetHtml };
}

    const t = setTimeout(() => { sc.scrollTop = sc.scrollHeight; }, 50);
    return () => clearTimeout(t);
  }, [allMsgs, thinking, activeId]);

  // Нова сесія
  const newChat = useCallback(() => {
    const id = "s" + Date.now();
    const s = { id, title: "New chat", updatedAt: Date.now() };
    setSessions(prev => [s, ...prev]);
    setAllMsgs(prev => ({ ...prev, [id]: [] }));
    setActiveId(id);
    try { localStorage.setItem("veles_active", id); } catch {}
  }, []);

  // Завантажуємо історію з бекенду при першому відкритті сесії
  useEffect(() => {
    const sid = activeId;
    if ((allMsgs[sid] || []).length > 0) return; // вже є повідомлення
    getSessionToken(sid).then(token => {
      loadBackendHistory(token).then(history => {
        if (history.length > 0) {
          setAllMsgs(prev => ({ ...prev, [sid]: history }));
        }
      });
    }).catch(() => {});
  }, [activeId]);

  // Стрімінг через FastAPI бекенд (з live-tools: FRED, NBU, World Bank)
  const send = useCallback(async (userText) => {
    if (thinking) return;

    const sid = activeId;

    setAllMsgs(prev => ({
      ...prev,
      [sid]: [...(prev[sid] || []), { role: "user", text: userText }]
    }));

    setSessions(prev => prev.map(s =>
      s.id === sid
        ? { ...s, title: userText.slice(0, 42) + (userText.length > 42 ? "…" : ""), updatedAt: Date.now() }
        : s
    ));

    setThinkType(detectType(userText));
    setThinking(true);

    try {
      const token = await getSessionToken(sid);
      const ctrl = new AbortController();
      abortRef.current = ctrl;

      const res = await fetch(`${BACKEND}/chatbot/chat/stream`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token,
        },
        signal: ctrl.signal,
        body: JSON.stringify({
          messages: [{ role: "user", content: userText }],
        }),
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`Backend error ${res.status}: ${err}`);
      }

      setThinking(false);
      setAllMsgs(prev => ({
        ...prev,
        [sid]: [...(prev[sid] || []), { role: "ai", text: "", streaming: true }]
      }));

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith("data:")) continue;
          const data = trimmed.slice(5).trim();
          try {
            const parsed = JSON.parse(data);
            if (parsed.done) break;
            const delta = parsed.content;
            if (!delta) continue;

            // Tool call marker — оновлюємо статус у поточній бульбашці
            if (delta.startsWith("\x00TOOL:")) {
              const tools = delta.slice(6);
              const label = tools.includes("fx") || tools.includes("macro") ? "⟳ Отримую ринкові дані..." :
                            tools.includes("market") ? "⟳ Завантажую котирування..." :
                            tools.includes("search") ? "⟳ Шукаю актуальну інформацію..." :
                            `⟳ Виконую: ${tools}...`;
              setAllMsgs(prev => {
                const cur = [...(prev[sid] || [])];
                const last = cur[cur.length - 1];
                if (last && last.streaming) {
                  cur[cur.length - 1] = { ...last, status: label };
                }
                return { ...prev, [sid]: cur };
              });
              continue;
            }

            // Реальний токен — буферизуємо і flush кожні 40мс
            tokenBuf.current += delta;
            if (!flushTimer.current) {
              flushTimer.current = setTimeout(() => {
                const chunk = tokenBuf.current;
                tokenBuf.current = "";
                flushTimer.current = null;
                setAllMsgs(prev => {
                  const cur = [...(prev[sid] || [])];
                  const last = cur[cur.length - 1];
                  if (last && last.streaming) {
                    cur[cur.length - 1] = { ...last, text: last.text + chunk, status: undefined };
                  }
                  return { ...prev, [sid]: cur };
                });
              }, 40);
            }
          } catch (_) {}
        }
      }

      // Flush залишок буфера
      if (flushTimer.current) { clearTimeout(flushTimer.current); flushTimer.current = null; }
      if (tokenBuf.current) {
        const last_chunk = tokenBuf.current; tokenBuf.current = "";
        setAllMsgs(prev => {
          const cur = [...(prev[sid] || [])];
          const last = cur[cur.length - 1];
          if (last && last.streaming) cur[cur.length - 1] = { ...last, text: last.text + last_chunk, status: undefined };
          return { ...prev, [sid]: cur };
        });
      }

      // Завершуємо стрімінг
      setAllMsgs(prev => {
        const cur = [...(prev[sid] || [])];
        const last = cur[cur.length - 1];
        if (last && last.streaming) {
          cur[cur.length - 1] = { ...last, streaming: false };
        }
        return { ...prev, [sid]: cur };
      });

    } catch (err) {
      setThinking(false);
      if (err.name === "AbortError") return;
      setAllMsgs(prev => ({
        ...prev,
        [sid]: [...(prev[sid] || []), { role: "ai", text: "⚠️ " + err.message }]
      }));
    }
  }, [activeId, allMsgs, thinking]);

  const iconBtn = { width: 38, height: 38, borderRadius: "50%", cursor: "pointer",
    display: "inline-flex", alignItems: "center", justifyContent: "center", color: "var(--text-secondary)",
    background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.10)" };

  return (
    <div style={{ position: "relative", zIndex: 1, height: "100%", display: "flex" }}>
      {sbOpen && <VelesSidebar sessions={sessions} active={activeId} onSelect={setActiveId} onNew={newChat} />}

      <main style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column", height: "100%" }}>
        <header style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "16px 28px", borderBottom: "1px solid rgba(255,255,255,0.07)", flexShrink: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
            <button style={iconBtn} aria-label="Toggle chats" onClick={() => setSbOpen(v => !v)}>
              <i data-lucide={sbOpen ? "panel-left-close" : "panel-left-open"} style={{ width: 16, height: 16 }}></i>
            </button>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontSize: 15, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden",
                textOverflow: "ellipsis" }}>{title}</div>
              <div style={{ fontSize: 12, color: "var(--text-tertiary)" }}>Financial analyst · Due diligence</div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Badge tone="neutral">Pro</Badge>
            <button style={iconBtn} aria-label="Share"><i data-lucide="share-2" style={{ width: 16, height: 16 }}></i></button>
            <button style={iconBtn} aria-label="Model settings"><i data-lucide="sliders-horizontal" style={{ width: 16, height: 16 }}></i></button>
            <button style={iconBtn} aria-label="Toggle analysis panel" onClick={() => setRpOpen(v => !v)}>
              <i data-lucide={rpOpen ? "panel-right-close" : "panel-right-open"} style={{ width: 16, height: 16 }}></i>
            </button>
          </div>
        </header>

        <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column",
          maxWidth: 760, margin: "0 auto", width: "100%", padding: "0 24px", boxSizing: "border-box" }}>
          <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column",
            gap: 18, padding: "24px 0 20px" }}>
            {msgs.length === 0 && (
              <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center",
                justifyContent: "center", gap: 20, paddingTop: 60 }}>
                <span style={{ width: 52, height: 52, borderRadius: 14, padding: 3, background: "var(--rainbow)",
                  display: "inline-flex" }}>
                  <span style={{ width: "100%", height: "100%", borderRadius: 11, background: "#0c0c10",
                    display: "inline-flex", alignItems: "center", justifyContent: "center",
                    fontWeight: 700, fontSize: 22, color: "var(--text-primary)" }}>V</span>
                </span>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 20, fontWeight: 600, marginBottom: 6 }}>Veles AI</div>
                  <div style={{ fontSize: 14, color: "var(--text-secondary)" }}>Premium financial analyst. Ask me anything.</div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, width: "100%", maxWidth: 520 }}>
                  {["Run due diligence on a company", "Analyze revenue risks", "Compare EBITDA margins", "Calculate intrinsic value DCF"].map(q => (
                    <button key={q} onClick={() => send(q)}
                      style={{ padding: "12px 14px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.10)",
                        background: "rgba(255,255,255,0.04)", color: "var(--text-secondary)",
                        fontFamily: "var(--font-sans)", fontSize: 13.5, cursor: "pointer", textAlign: "left" }}>
                      {q}
                    </button>
                  ))}
                </div>
              </div>
            )}
            {msgs.map((m, i) => (
              <Bubble key={i} role={m.role === "ai" ? "ai" : "user"} streaming={m.streaming} status={m.status && !m.text ? m.status : null}>
                {m.text || ""}
              </Bubble>
            ))}
            {thinking && <VelesThinking type={thinkType} />}
          </div>
          <div style={{ paddingBottom: 24, flexShrink: 0 }}>
            <Composer onSend={send} thinking={thinking} />
          </div>
        </div>
      </main>

      {rpOpen && <VelesRightPanel />}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   App
   ═══════════════════════════════════════════════════════════════ */
function App() {
  React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
  return (
    <div style={{ position: "fixed", inset: 0, background: "#08080a" }}>
      <div aria-hidden="true" className="veles-mesh" style={{ position: "absolute", inset: 0 }}></div>
      <ChatScreen />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
